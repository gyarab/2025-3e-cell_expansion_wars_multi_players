<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- viewport = stránka se přizpůsobí mobilním obrazovkám, nesmazávat -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Cell Wars</title>
    <!-- link rel="stylesheet" = připojí CSS soubor k tomuto HTML -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="menu">

<!--  přihlašovací box fixně v pravém horním rohu (position: fixed v CSS) -->
<div id="loginBox">
    <!--  loginForm = zobrazí se když nikdo není přihlášen -->
    <div id="loginForm">
        <!--  type="password" = skryje znaky při psaní hesla -->
        <input type="text" id="username" placeholder="Name">
        <input type="password" id="password" placeholder="Password" autocomplete="current-password">

        <!--onclick="login()" zavolá funkci login() z login.js -->
        <button onclick="login()">Login</button>
        <button onclick="register()">Register</button>
        <!-- sem se vypíše chybová hláška při špatném přihlášení -->
        <p id="loginMessage"></p>
    </div>

    <!-- userPanel = zobrazí se po úspěšném přihlášení, jinak skrytý -->
    <div id="userPanel" class="hidden">
        <span id="welcomeText"></span>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<!--  section = zabere celou výšku obrazovky (min-height: 100vh v CSS) -->
<section class="hero-section" id="hero">
    <h1 class="title">Brain Cell Wars</h1>
    <!--  intro text je omezený na max-width: 720px v CSS aby byl čitelný -->
    <p class="intro-text">
        Čau lidi! Vítejte ve hře Brain Cell Wars, kde budete bránit své mozkové buňky před invazí škodlivých virů a bakterií.
    </p>
    <!--href="#levels" = skočí na sekci s id="levels" na stejné stránce -->
    <a href="#levels" class="scroll-down">&#8595; Scroll Down</a>
</section>

<!-- druhá sekce = výběr levelů, id="levels" sem skáče šipka nahoru -->
<section class="levels-section" id="levels">
    <h2>Můžete zkusit náš level:</h2>

    <div class="level-buttons">
        <!-- data-level="1" = vlastní atribut, čte ho updateLevelButtons() v login.js -->
        <!-- class="level-btn" = JS ho najde přes querySelectorAll(".level-btn") -->
        <button class="level-button level-btn" data-level="1">LEVEL 1</button>
        <button class="level-button level-btn" data-level="2">LEVEL 2</button>
        <!-- disabled = tlačítko nejde kliknout, odstraň až level 3 bude hotový -->
        <button class="level-button level-btn" data-level="3">LEVEL 3</button>
    </div>

    <!--disabled = multiplayer zatím neexistuje, jen pro ukázku -->
    <div class="multiplayer-button">
        <button disabled>MULTIPLAYER (Přijde brzo)</button>
    </div>
</section>

<!--: login.js musí být načteno PŘED inline scriptem níže -->
<!-- protože inline script volá updateLevelButtons() která je definována v login.js -->
<script src="login.js"></script>

<!-- achievements tlačítko fixně vlevo nahoře (position: fixed v CSS) -->
<button id="achievementsBtn" class="level-button achievements-btn">úspěchy</button>

<!-- achievements popup = skrytý dokud hráč neklikne na tlačítko 
<div id="achievementsPopup" class="notification hidden"> -->
<div id="achievementsPopup" class="overlay hidden">
    <h2>Úspěchy</h2>
    <!-- achievementsList = sem renderAchievements() dynamicky vkládá HTML -->
    <div id="achievementsList"></div>
    <button id="achCloseBtn">Zavřít</button>
</div>

<script>
// DOMContentLoaded = počká až se načte celé HTML, pak spustí kód
// bez toho by getElementById nenašel elementy protože by ještě neexistovaly
document.addEventListener('DOMContentLoaded', () => {

    //  updateLevelButtons() přidá správné třídy 
    // a onclick handlery na všechna tlačítka levelů podle uloženého postupu
    if (typeof updateLevelButtons === 'function') updateLevelButtons();

    const achievementsBtn = document.getElementById("achievementsBtn");
    const achievementsPopup = document.getElementById("achievementsPopup");
    const achCloseBtn = document.getElementById("achCloseBtn");

    // addEventListener reaguje na kliknutí na tlačítko
    if (achievementsBtn) {
        achievementsBtn.addEventListener("click", () => {
            // CHEAT: typeof kontroluje jestli funkce existuje, aby nehavaroval kód
            if (typeof openAchievements === 'function') openAchievements();
            else {
                window.gamePaused = true;
                if (achievementsPopup) achievementsPopup.classList.remove("hidden");
                if (typeof renderAchievements === 'function') renderAchievements();
            }
        });
    }

    if (achCloseBtn) {
        achCloseBtn.addEventListener("click", () => {
            // CHEAT: classList.add("hidden") = skryje element (display:none v CSS)
            if (typeof closeAchievements === 'function') closeAchievements();
            else if (achievementsPopup) achievementsPopup.classList.add("hidden");
        });
    }
});
</script>

</body>
</html>
